name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION_CODE="$GITHUB_RUN_NUMBER"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="$GITHUB_REF_NAME"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Release tag must use SemVer with a leading v, for example v0.1.0."
              exit 1
            fi
            VERSION_NAME="${TAG#v}"
            ARTIFACT_SUFFIX="$TAG"
            RELEASE_BUILD="true"
          else
            VERSION_NAME="0.0.0-${GITHUB_SHA::12}"
            ARTIFACT_SUFFIX="${GITHUB_SHA::12}"
            RELEASE_BUILD="false"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=$ARTIFACT_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "release_build=$RELEASE_BUILD" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin

      - name: Prepare release signing
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [[ -z "$RELEASE_KEYSTORE_BASE64" || -z "$RELEASE_STORE_PASSWORD" || -z "$RELEASE_KEY_ALIAS" || -z "$RELEASE_KEY_PASSWORD" ]]; then
            echo "::error::Release signing secrets are required for tagged release builds."
            exit 1
          fi

          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build APK
        id: build-apk
        shell: bash
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p release-artifacts

          if [[ "${{ steps.version.outputs.release_build }}" == "true" ]]; then
            ./gradlew :app:assembleRelease \
              -PVERSION_NAME="${{ steps.version.outputs.version_name }}" \
              -PVERSION_CODE="${{ steps.version.outputs.version_code }}" \
              -PRELEASE_STORE_FILE="$RUNNER_TEMP/release.keystore" \
              -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
              -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
              -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

            SOURCE_APK="app/build/outputs/apk/release/app-release.apk"
            OUTPUT_APK="simple-ftp-${{ steps.version.outputs.artifact_suffix }}.apk"
          else
            ./gradlew :app:assembleDebug \
              -PVERSION_NAME="${{ steps.version.outputs.version_name }}" \
              -PVERSION_CODE="${{ steps.version.outputs.version_code }}"

            SOURCE_APK="app/build/outputs/apk/debug/app-debug.apk"
            OUTPUT_APK="simple-ftp-${{ steps.version.outputs.artifact_suffix }}-debug.apk"
          fi

          cp "$SOURCE_APK" "release-artifacts/$OUTPUT_APK"
          sha256sum "release-artifacts/$OUTPUT_APK" > "release-artifacts/$OUTPUT_APK.sha256"

          echo "apk_name=$OUTPUT_APK" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: simple-ftp-artifacts
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Generate update manifest
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          TAG="${GITHUB_REF_NAME}"
          APK_NAME="${{ steps.build-apk.outputs.apk_name }}"
          ARTIFACT_DIR="release-artifacts"
          SITE_DIR="site/updates"
          CHANGELOG_DIR="$SITE_DIR/changelog"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          CHANGELOG_URL="https://cybercat2033.github.io/SimpleFTP/updates/changelog"
          RELEASED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if [[ ! -s CHANGELOG.md || ! -s CHANGELOG.ru.md ]]; then
            echo "::error::CHANGELOG.md and CHANGELOG.ru.md must exist and be non-empty."
            exit 1
          fi

          mkdir -p "$CHANGELOG_DIR"
          cp CHANGELOG.md "$CHANGELOG_DIR/CHANGELOG.md"
          cp CHANGELOG.ru.md "$CHANGELOG_DIR/CHANGELOG.ru.md"

          cat > "$SITE_DIR/latest.json" <<EOF
          {
            "schemaVersion": 1,
            "packageName": "com.cybercat.simpleftp",
            "versionName": "$VERSION",
            "versionCode": $VERSION_CODE,
            "minSdk": 23,
            "releasedAt": "$RELEASED_AT",
            "changelogUrl": "$CHANGELOG_URL/CHANGELOG.md",
            "changelogUrls": {
              "en": "$CHANGELOG_URL/CHANGELOG.md",
              "ru": "$CHANGELOG_URL/CHANGELOG.ru.md"
            },
            "artifacts": [
              {
                "abi": "universal",
                "fileName": "$APK_NAME",
                "url": "$RELEASE_URL/$APK_NAME",
                "sha256": "$(sha256sum "$ARTIFACT_DIR/$APK_NAME" | cut -d ' ' -f 1)",
                "sizeBytes": $(stat -c%s "$ARTIFACT_DIR/$APK_NAME")
              }
            ]
          }
          EOF

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version_name }}"
          CHANGELOG_NOTES="release-artifacts/changelog.md"

          if ! awk -v version="$VERSION" '
            $1 == "##" && $2 == "[" version "]" {
              found = 1
              printing = 1
              next
            }
            printing && /^##[[:space:]]+\[/ {
              exit
            }
            printing {
              print
            }
            END {
              if (!found) {
                exit 44
              }
            }
          ' CHANGELOG.md > "$CHANGELOG_NOTES"; then
            echo "::error::Could not find changelog section for version $VERSION in CHANGELOG.md."
            exit 1
          fi

          if [ ! -s "$CHANGELOG_NOTES" ]; then
            echo "::error::Changelog section for version $VERSION in CHANGELOG.md is empty."
            exit 1
          fi

          cat > release-artifacts/release-notes.md <<EOF
          ## Simple FTP ${GITHUB_REF_NAME}

          Minimal FTP server for Android-based e-readers, optimized for PocketBook and eBookSender.

          ## Changelog

          $(cat "$CHANGELOG_NOTES")
          EOF

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/simple-ftp-${{ github.ref_name }}.apk
            release-artifacts/simple-ftp-${{ github.ref_name }}.apk.sha256
          body_path: release-artifacts/release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Upload update manifest Pages artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    name: Deploy Update Manifest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
